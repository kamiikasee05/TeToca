# ============================================================
# TeToca — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  scheduler:
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  landing-admin:
    ports:
      - "8081:8080"
    environment:
      LOG_LEVEL: warn
    healthcheck:
      test: ["CMD", "php", "-r", "echo @file_get_contents('http://localhost:8080/admin/index.php') ? exit(0) : exit(1);"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  n8n:
    ports:
      - "5678:5678"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  landing:
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  openwa:
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2785/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


