# Rate limiting zones (http context)
limit_req_zone $binary_remote_addr zone=booking:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=connperip:10m;

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # Apply rate limits to booking API
    limit_req zone=booking burst=5 nodelay;
    limit_conn connperip 10;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    resolver 127.0.0.11 valid=10s;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;

    # Proxy scheduler API
    location /api/v1 {
        set $scheduler scheduler:3000;
        proxy_pass http://$scheduler/api/v1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /admin y /api al panel PHP
    location /admin {
        set $admin landing-admin:8080;
        proxy_pass http://$admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api {
        set $api_admin landing-admin:8080;
        proxy_pass http://$api_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
