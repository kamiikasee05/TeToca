# Rate limiting zones (http context)
limit_req_zone $binary_remote_addr zone=booking:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=connperip:10m;

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # Apply rate limits to booking API
    limit_req zone=booking burst=5 nodelay;
    limit_conn connperip 10;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Proxy scheduler API
    location /api/v1 {
        proxy_pass http://scheduler:3000/api/v1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # PHP-FPM para admin panel
    location /admin {
        alias /var/www/admin-files/;
        try_files $uri $uri/ /admin/index.php$is_args$args;
        location ~ \.php$ {
            fastcgi_pass landing-admin:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    location /api {
        alias /var/www/admin-files/;
        try_files $uri $uri/ /api/index.php$is_args$args;
        location ~ \.php$ {
            fastcgi_pass landing-admin:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
