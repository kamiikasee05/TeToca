volumes:
  redis-data:
  openwa_data:
  scheduler_data:

networks:
  stack:
    name: stack
    external: false

services:
  scheduler:
    build:
      context: scheduler
      dockerfile: Dockerfile
    container_name: scheduler
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - scheduler_data:/app/data
    environment:
      PORT: 3000
      API_KEY: ${SCHEDULER_API_KEY}
      OPENWA_API_KEY: ${OPENWA_API_KEY}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID}
      NODE_OPTIONS: --dns-result-order=ipv4first
    depends_on:
      openwa:
        condition: service_started
    networks:
      - stack

  landing:
    image: nginx:alpine
    container_name: landing
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - ./landing:/usr/share/nginx/html
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./landing/config.json:/usr/share/nginx/html/config.json
      - ./landing-salon/uploads:/usr/share/nginx/html/uploads
    networks:
      - stack

  landing-admin:
    build:
      context: landing-salon
      dockerfile: Dockerfile
    container_name: landing-admin
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./landing-salon:/var/www/html
      - ./landing/config.json:/var/www/landing-config.json
    working_dir: /var/www/html
    environment:
      SCHEDULER_API_KEY: ${SCHEDULER_API_KEY}
      OPENWA_API_KEY: ${OPENWA_API_KEY}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PHP_CLI_SERVER_WORKERS: 8
    networks:
      - stack

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ${REDIS_PASSWORD:+redis-server --requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis-data:/data
    networks:
      - stack

  openwa:
    image: docker.io/library/openwa-openwa:latest
    container_name: tetoca_openwa
    restart: unless-stopped
    ports:
      - "2785:2785"
    environment:
      NODE_ENV: development
      PORT: 2785
      LOG_LEVEL: info
      DATABASE_TYPE: sqlite
      DATABASE_NAME: /app/data/openwa.sqlite
      DATABASE_SYNCHRONIZE: "true"
      ENGINE_TYPE: whatsapp-web.js
      SESSION_DATA_PATH: /app/data/sessions
      PUPPETEER_HEADLESS: "true"
      PUPPETEER_ARGS: --no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/data/media
      REDIS_ENABLED: "false"
      CACHE_ENABLED: "false"
      QUEUE_ENABLED: "false"
      API_MASTER_KEY: ${API_MASTER_KEY}
      WEBHOOK_TIMEOUT: 10000
      WEBHOOK_MAX_RETRIES: 3
      WEBHOOK_RETRY_DELAY: 5000
    volumes:
      - openwa_data:/app/data
    networks:
      - stack
