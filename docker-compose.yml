volumes:
  redis-data:
  n8n_data:
  openwa_data:
  scheduler_data:

networks:
  stack:
    name: stack
    external: false

services:
  scheduler:
    build:
      context: scheduler
      dockerfile: Dockerfile
    container_name: scheduler
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - scheduler_data:/app/data
    environment:
      PORT: 3000
      API_KEY: ${SCHEDULER_API_KEY}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/
    depends_on:
      n8n:
        condition: service_started
    networks:
      - stack

  landing:
    image: nginx:alpine
    container_name: landing
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - ./landing:/usr/share/nginx/html
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./landing-salon/config.json:/usr/share/nginx/html/config.json
      - ./landing-salon/uploads:/usr/share/nginx/html/uploads
    networks:
      - stack

  landing-admin:
    build:
      context: landing-salon
      dockerfile: Dockerfile
    container_name: landing-admin
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./landing-salon:/var/www/html
      - ./landing/config.json:/var/www/landing-config.json
    working_dir: /var/www/html
    environment:
      SCHEDULER_API_KEY: ${SCHEDULER_API_KEY}
      OPENWA_API_KEY: ${OPENWA_API_KEY}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID}
      N8N_WEBHOOK_TOKEN: ${N8N_WEBHOOK_TOKEN}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PHP_CLI_SERVER_WORKERS: 4
    networks:
      - stack

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ${REDIS_PASSWORD:+redis-server --requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis-data:/data
    networks:
      - stack

  n8n:
    image: n8nio/n8n:2.26.3
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_HOST: "localhost:5678"
      WEBHOOK_URL: "http://localhost:5678"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      DB_TYPE: sqlite
      TZ: America/Argentina/Buenos_Aires
      N8N_WEBHOOK_TOKEN: ${N8N_WEBHOOK_TOKEN}
      N8N_OWNER_PHONE: ${N8N_OWNER_PHONE}
      SCHEDULER_API_KEY: ${SCHEDULER_API_KEY}
      OPENWA_API_KEY: ${OPENWA_API_KEY}
      OPENWA_SESSION_ID: ${OPENWA_SESSION_ID}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - stack

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    # ports:
    #   - "1025:1025"
    #   - "8025:8025"
    networks:
      - stack

  openwa:
    image: docker.io/library/openwa-openwa:latest
    container_name: tetoca_openwa
    restart: unless-stopped
    ports:
      - "2785:2785"
    environment:
      NODE_ENV: development
      PORT: 2785
      LOG_LEVEL: info
      DATABASE_TYPE: sqlite
      DATABASE_NAME: /app/data/openwa.sqlite
      DATABASE_SYNCHRONIZE: "true"
      ENGINE_TYPE: whatsapp-web.js
      SESSION_DATA_PATH: /app/data/sessions
      PUPPETEER_HEADLESS: "true"
      PUPPETEER_ARGS: --no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/data/media
      REDIS_ENABLED: "false"
      CACHE_ENABLED: "false"
      QUEUE_ENABLED: "false"
      API_MASTER_KEY: ${API_MASTER_KEY}
      WEBHOOK_TIMEOUT: 10000
      WEBHOOK_MAX_RETRIES: 3
      WEBHOOK_RETRY_DELAY: 5000
    volumes:
      - openwa_data:/app/data
    networks:
      - stack
